# ctrl.yaml schema reference
# This is a human-readable spec, not a machine-enforced JSON Schema.
# Future: can be converted to JSON Schema for linting.

ctrl:
  version: string          # required — minimum ctrl version (e.g. "0.1")

meta:
  project: string          # required — project name
  registry: string         # optional — default image registry prefix
  ssh_host: string         # required for remote commands — supports ${ENV_VAR}
  ssh_user: string         # default: root
  ssh_port: string         # default: "22"
  ssh_key: string          # optional — path to SSH private key
  compose_path: string     # default: /opt/scaffold/docker-compose.yml
  env_files:               # optional list of files to source
    - string

services:                  # required — list of service definitions
  - name: string           # required — unique, lowercase, hyphen-separated
    description: string    # optional — shown in ctrl list
    image: string          # required — full image name without tag
    tag: string            # default: latest
    build:
      tool: string         # maven | gradle | npm | make | shell | skip
      dir: string          # required — path to source (relative to ctrl.yaml)
      args: string         # optional — extra build arguments
      prerequisites:       # optional — build these dirs first
        - string
      dockerfile: string   # default: Dockerfile (relative to build.dir)
      context: string      # default: build.dir
      platform: string     # default: linux/amd64
      script: string       # required when tool=shell — path to build script
    deploy:
      compose_service: string  # default: service name
      depends_on:          # optional — compose services to start before deploy
        - string
    health:
      url: string          # full URL takes priority
      port: number         # constructs http://localhost:<port>/actuator/health
    smoke_tests:           # list of script names (from scripts:) to run as smoke tests
      - string

scripts:                   # optional — named runnable scripts
  - name: string           # unique identifier
    path: string           # path to script (relative to ctrl.yaml)
    description: string    # optional

deployments:               # required for sync / dep / rdep commands
  default: string          # name of the default target (used when target omitted)
  targets:
    - name: string         # unique target name (e.g. prod, staging)
      ssh_host: string     # overrides meta.ssh_host for this target
      ssh_user: string     # overrides meta.ssh_user
      ssh_port: string     # overrides meta.ssh_port
      ssh_key: string      # overrides meta.ssh_key
      compose_path: string # path to docker-compose.yml on this target's VM
      sync:
        paths:
          - string         # files/dirs to rsync (relative to ctrl.yaml)

extensions:                # optional — sourced at startup, can define ctrl_cmd_<name>()
  - string                 # path to extension script (relative to ctrl.yaml)
