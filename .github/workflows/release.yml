name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build single-file ctrl
        run: bash build.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ctrl
          generate_release_notes: true
