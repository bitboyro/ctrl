name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Static analysis ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: ctrl.sh build.sh install.sh
          scandir: ./lib
          severity: warning
      - name: shfmt (advisory)
        continue-on-error: true
        run: |
          curl -fsSL -o /tmp/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.8.0/shfmt_v3.8.0_linux_amd64
          chmod +x /tmp/shfmt
          /tmp/shfmt -d -i 2 -ci -bn ctrl.sh lib/*.sh build.sh install.sh || true

  # ── 2. Unit tests (matrix) ──────────────────────────────────────────────────
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install yq (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install yq (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install yq

      - name: Install bats-core
        uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.11.0
          support-install: false
          assert-install: false
          file-install: false

      - name: Run unit tests
        run: bats tests/unit/

  # ── 3. Property tests ───────────────────────────────────────────────────────
  property:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install bats-core
        uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.11.0
          support-install: false
          assert-install: false
          file-install: false

      - name: Run property tests
        env:
          PROPERTY_ITERATIONS: 50
        run: bats tests/property/

  # ── 4. dist/ctrl smoke ──────────────────────────────────────────────────────
  smoke-dist:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install bats-core
        uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.11.0
          support-install: false
          assert-install: false
          file-install: false

      - name: Build dist/ctrl
        run: bash build.sh

      - name: Run dist smoke tests
        run: bats tests/smoke/

      - name: Upload dist/ctrl artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-ctrl
          path: dist/ctrl
          retention-days: 7

  # ── 5. Integration (sshd in a service container) ────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: [unit, smoke-dist]
    services:
      sshd:
        image: lscr.io/linuxserver/openssh-server:latest
        ports:
          - 2222:2222
        env:
          PASSWORD_ACCESS: "true"
          USER_NAME: ctrltest
          USER_PASSWORD: ctrltest
          SUDO_ACCESS: "true"
          PUID: "1000"
          PGID: "1000"
    env:
      TEST_SSH_HOST: 127.0.0.1
      TEST_SSH_PORT: "2222"
      TEST_SSH_USER: ctrltest
      TEST_SSH_PASSWORD: ctrltest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq, jq, sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass jq
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Install bats-core
        uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.11.0
          support-install: false
          assert-install: false
          file-install: false

      - name: Wait for sshd
        run: |
          for i in $(seq 1 30); do
            sshpass -p "${TEST_SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=2 \
              -p "${TEST_SSH_PORT}" \
              "${TEST_SSH_USER}@${TEST_SSH_HOST}" true 2>/dev/null \
              && exit 0
            sleep 1
          done
          echo "sshd never came up" >&2
          exit 1

      - name: Run integration tests
        run: bats tests/integration/
